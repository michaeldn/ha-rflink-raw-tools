title: RFLink Raw Tools
views:
  - title: Start
    path: rflink-start
    icon: mdi:home-automation
    cards:
      - type: picture
        image: /local/rflink_raw/logo.png
        tap_action:
          action: none
        hold_action:
          action: none

      - type: markdown
        content: |
          # RFLink Raw Tools

          Safe build: every managed setup change has a matching undo switch.

          Use **Setup** for dashboard/sidebar/prerequisite controls.
          Use **Control** to send commands.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Setup
            icon: mdi:cog-outline
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-setup
          - type: button
            name: Control
            icon: mdi:remote
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-control
          - type: button
            name: Debug
            icon: mdi:radio-tower
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-debug
          - type: button
            name: Update
            icon: mdi:update
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-update

  - title: Setup
    path: rflink-setup
    icon: mdi:cog-outline
    cards:
      - type: entities
        title: RFLink prerequisite
        show_header_toggle: false
        entities:
          - entity: text.rflink_prerequisite_port
            name: Port
          - entity: number.rflink_prerequisite_reconnect_interval
            name: Reconnect interval
          - entity: switch.rflink_prerequisite_wait_for_ack
            name: Wait for ACK
          - entity: switch.install_rflink_prerequisite
            name: Install RFLink prerequisite

      - type: markdown
        content: |
          Turning **Install RFLink prerequisite** off removes only the managed RFLink block that RFLink Raw Tools created.

      - type: entities
        title: Dashboard
        show_header_toggle: false
        entities:
          - entity: switch.add_dashboard
            name: Add dashboard
          - entity: switch.add_to_sidebar
            name: Add to sidebar
          - entity: switch.dashboard_require_admin
            name: Require admin

      - type: markdown
        content: |
          Turning **Add dashboard** off removes the managed dashboard registration, dashboard YAML file, and RFLink Raw Tools logo folder.

  - title: Control
    path: rflink-control
    icon: mdi:remote
    cards:
      - type: entities
        title: Command
        show_header_toggle: false
        entities:
          - entity: text.control_rflink_raw_command
            name: Raw command
          - entity: text.control_rflink_protocol_device_id
            name: Protocol device ID
          - entity: text.control_rflink_protocol_command
            name: Protocol command
          - entity: number.control_rflink_repeat_count
            name: Repeat
          - entity: number.control_rflink_repeat_delay
            name: Delay

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Send raw
            icon: mdi:send
            entity: button.control_send_rflink_raw_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.control_send_rflink_raw_command
          - type: button
            name: Send protocol
            icon: mdi:remote
            entity: button.control_send_rflink_protocol_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.control_send_rflink_protocol_command

  - title: Debug
    path: rflink-debug
    icon: mdi:radio-tower
    cards:
      - type: entities
        title: Capture
        show_header_toggle: false
        entities:
          - entity: switch.debug_rflink_qrfdebug
            name: QRFDEBUG
          - entity: switch.debug_rflink_rfdebug
            name: RFDEBUG

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Ping
            icon: mdi:access-point-check
            entity: button.debug_rflink_ping
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_ping
          - type: button
            name: Version
            icon: mdi:information-outline
            entity: button.debug_rflink_version
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_version

  - title: Update
    path: rflink-update
    icon: mdi:update
    cards:
      - type: markdown
        content: |
          Updates create a backup first. Use **Undo Last GitHub Update** if needed before restarting.

      - type: button
        name: Download latest
        icon: mdi:cloud-download-outline
        entity: button.update_download_latest_from_github
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.update_download_latest_from_github

      - type: button
        name: Undo last update
        icon: mdi:backup-restore
        entity: button.undo_last_github_update
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.undo_last_github_update
