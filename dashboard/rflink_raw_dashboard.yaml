title: RFLink Raw Tools
views:
  - title: Start
    path: rflink-start
    icon: mdi:home-automation
    cards:
      - type: picture
        image: /local/rflink_raw/logo.png
        tap_action:
          action: none
        hold_action:
          action: none

      - type: markdown
        content: |
          # RFLink Raw Tools

          This is the primary UI. The Home Assistant device page is only for admin/configuration.

          **Setup** — RFLink and dashboard/sidebar config.  
          **Control** — send RFLink commands.  
          **Debug** — capture RF packets.  
          **Update** — update from GitHub.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Setup
            icon: mdi:cog-outline
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-setup
          - type: button
            name: Control
            icon: mdi:remote
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-control
          - type: button
            name: Debug
            icon: mdi:radio-tower
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-debug
          - type: button
            name: Update
            icon: mdi:update
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-update

  - title: Setup
    path: rflink-setup
    icon: mdi:cog-outline
    cards:
      - type: markdown
        content: |
          ## Setup

          Leave **Show in sidebar** on if this should be the main RFLink Raw Tools page.

      - type: entities
        title: RFLink prerequisite
        show_header_toggle: false
        entities:
          - entity: text.setup_rflink_prerequisite_port
            name: USB port
          - entity: switch.setup_rflink_prerequisite_wait_for_ack
            name: Wait for ACK
          - entity: number.setup_rflink_prerequisite_reconnect_interval
            name: Reconnect interval

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Load defaults
            icon: mdi:tune-variant
            entity: button.setup_load_default_prerequisite_values
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.setup_load_default_prerequisite_values
          - type: button
            name: Install RFLink YAML
            icon: mdi:file-cog-outline
            entity: button.setup_install_rflink_prerequisite_yaml
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.setup_install_rflink_prerequisite_yaml

      - type: entities
        title: Dashboard/sidebar
        show_header_toggle: false
        entities:
          - entity: switch.dashboard_show_in_sidebar
            name: Show in sidebar
          - entity: switch.dashboard_require_admin
            name: Require admin
          - type: button
            name: Install/update dashboard
            icon: mdi:view-dashboard-edit-outline
            action_name: Install
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.dashboard_install_update_sidebar_page

  - title: Control
    path: rflink-control
    icon: mdi:remote
    cards:
      - type: markdown
        content: |
          ## Send commands

          Use raw command for complete `10;...;` RFLink lines.

      - type: entities
        title: Command settings
        show_header_toggle: false
        entities:
          - entity: text.control_rflink_raw_command
            name: Raw command
          - entity: text.control_rflink_protocol_device_id
            name: Protocol device ID
          - entity: text.control_rflink_protocol_command
            name: Protocol command
          - entity: number.control_rflink_repeat_count
            name: Repeat
          - entity: number.control_rflink_repeat_delay
            name: Delay

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Send raw
            icon: mdi:send
            entity: button.control_send_rflink_raw_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.control_send_rflink_raw_command
          - type: button
            name: Send protocol
            icon: mdi:remote
            entity: button.control_send_rflink_protocol_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.control_send_rflink_protocol_command

  - title: Debug
    path: rflink-debug
    icon: mdi:radio-tower
    cards:
      - type: markdown
        content: |
          ## Debug

          Start capture, press the physical RF remote/device button once, then check logs.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Start QRFDEBUG
            icon: mdi:signal
            entity: button.debug_start_qrfdebug_capture
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_start_qrfdebug_capture
          - type: button
            name: Stop QRFDEBUG
            icon: mdi:signal-off
            entity: button.debug_stop_qrfdebug_capture
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_stop_qrfdebug_capture
          - type: button
            name: Ping
            icon: mdi:access-point-check
            entity: button.debug_rflink_ping
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_ping
          - type: button
            name: Version
            icon: mdi:information-outline
            entity: button.debug_rflink_version
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_version

  - title: Update
    path: rflink-update
    icon: mdi:update
    cards:
      - type: markdown
        content: |
          ## Update without command line

          Press **Download latest**, wait for the notification, then restart Home Assistant Core.

      - type: button
        name: Download latest
        icon: mdi:cloud-download-outline
        entity: button.update_download_latest_from_github
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.update_download_latest_from_github
