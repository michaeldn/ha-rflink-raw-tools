title: RFLink Raw Tools
views:
  - title: Start
    path: rflink-start
    icon: mdi:home-automation
    cards:
      - type: picture
        image: /local/rflink_raw/logo.png
        tap_action:
          action: none
        hold_action:
          action: none

      - type: markdown
        content: |
          # RFLink Raw Tools

          This is the primary UI. The Home Assistant device page is only for admin/configuration.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Control
            icon: mdi:remote
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-control
          - type: button
            name: Debug
            icon: mdi:radio-tower
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-debug
          - type: button
            name: Setup
            icon: mdi:cog-outline
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-setup
          - type: button
            name: Update
            icon: mdi:update
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-update

  - title: Setup
    path: rflink-setup
    icon: mdi:cog-outline
    cards:
      - type: entities
        title: Dashboard
        show_header_toggle: false
        entities:
          - type: button
            name: Add dashboard
            icon: mdi:view-dashboard-plus-outline
            action_name: Add
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.add_dashboard
          - type: button
            name: Add to sidebar
            icon: mdi:menu-open
            action_name: Add
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.add_to_sidebar

  - title: Control
    path: rflink-control
    icon: mdi:remote
    cards:
      - type: entities
        title: Command
        show_header_toggle: false
        entities:
          - entity: text.control_rflink_raw_command
            name: Raw command
          - entity: text.control_rflink_protocol_device_id
            name: Protocol device ID
          - entity: text.control_rflink_protocol_command
            name: Protocol command
          - entity: number.control_rflink_repeat_count
            name: Repeat
          - entity: number.control_rflink_repeat_delay
            name: Delay

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Send raw
            icon: mdi:send
            entity: button.control_send_rflink_raw_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.control_send_rflink_raw_command
          - type: button
            name: Send protocol
            icon: mdi:remote
            entity: button.control_send_rflink_protocol_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.control_send_rflink_protocol_command

  - title: Debug
    path: rflink-debug
    icon: mdi:radio-tower
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Start QRFDEBUG
            icon: mdi:signal
            entity: button.debug_start_qrfdebug_capture
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_start_qrfdebug_capture
          - type: button
            name: Stop QRFDEBUG
            icon: mdi:signal-off
            entity: button.debug_stop_qrfdebug_capture
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_stop_qrfdebug_capture
          - type: button
            name: Ping
            icon: mdi:access-point-check
            entity: button.debug_rflink_ping
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_ping
          - type: button
            name: Version
            icon: mdi:information-outline
            entity: button.debug_rflink_version
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_version

  - title: Update
    path: rflink-update
    icon: mdi:update
    cards:
      - type: button
        name: Download latest
        icon: mdi:cloud-download-outline
        entity: button.update_download_latest_from_github
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.update_download_latest_from_github
