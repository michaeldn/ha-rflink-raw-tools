title: RFLink Raw Tools
views:
  - title: Start
    path: rflink-start
    icon: mdi:home-automation
    cards:
      - type: markdown
        content: |
          <p align="center"><img src="/local/rflink_raw/logo.png" width="120"></p>

          # RFLink Raw Tools

          Clean reset. Setup actions are buttons; only the valid action is available.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Setup
            icon: mdi:cog-outline
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-setup
          - type: button
            name: Control
            icon: mdi:remote
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-control
          - type: button
            name: Debug
            icon: mdi:radio-tower
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-debug
          - type: button
            name: Update
            icon: mdi:update
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-update

  - title: Setup
    path: rflink-setup
    icon: mdi:cog-outline
    cards:
      - type: markdown
        content: |
          <p align="center"><img src="/local/rflink_raw/logo.png" width="96"></p>

          ## Setup

          Install buttons are one-way actions. Undo buttons appear only after something has been installed.

      - type: entities
        title: RFLink prerequisite
        show_header_toggle: false
        entities:
          - entity: text.rflink_prerequisite_port
            name: Port
          - entity: number.rflink_prerequisite_reconnect_interval
            name: Reconnect interval
          - entity: switch.rflink_prerequisite_wait_for_ack
            name: Wait for ACK

      - type: grid
        title: Prerequisite actions
        columns: 2
        square: false
        cards:
          - type: button
            name: Install prerequisite
            icon: mdi:file-cog-outline
            entity: button.install_rflink_prerequisite
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.install_rflink_prerequisite
          - type: button
            name: Undo prerequisite
            icon: mdi:file-remove-outline
            entity: button.undo_rflink_prerequisite
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.undo_rflink_prerequisite

      - type: grid
        title: Dashboard actions
        columns: 2
        square: false
        cards:
          - type: button
            name: Add dashboard
            icon: mdi:view-dashboard-plus-outline
            entity: button.add_dashboard
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.add_dashboard
          - type: button
            name: Undo dashboard
            icon: mdi:view-dashboard-remove-outline
            entity: button.undo_dashboard
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.undo_dashboard
          - type: button
            name: Add to sidebar
            icon: mdi:menu-open
            entity: button.add_to_sidebar
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.add_to_sidebar
          - type: button
            name: Remove from sidebar
            icon: mdi:menu
            entity: button.remove_from_sidebar
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.remove_from_sidebar

  - title: Control
    path: rflink-control
    icon: mdi:remote
    cards:
      - type: entities
        title: Command
        show_header_toggle: false
        entities:
          - entity: text.rflink_raw_command
            name: Raw command
          - entity: text.rflink_protocol_device_id
            name: Protocol device ID
          - entity: text.rflink_protocol_command
            name: Protocol command
          - entity: number.rflink_repeat_count
            name: Repeat
          - entity: number.rflink_repeat_delay
            name: Delay

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Send raw
            icon: mdi:send
            entity: button.send_rflink_raw_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.send_rflink_raw_command
          - type: button
            name: Send protocol
            icon: mdi:remote
            entity: button.send_rflink_protocol_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.send_rflink_protocol_command

  - title: Debug
    path: rflink-debug
    icon: mdi:radio-tower
    cards:
      - type: entities
        title: Capture
        show_header_toggle: false
        entities:
          - entity: switch.rflink_qrfdebug
            name: QRFDEBUG
          - entity: switch.rflink_rfdebug
            name: RFDEBUG

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Ping
            icon: mdi:access-point-check
            entity: button.rflink_ping
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.rflink_ping
          - type: button
            name: Version
            icon: mdi:information-outline
            entity: button.rflink_version
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.rflink_version

  - title: Update
    path: rflink-update
    icon: mdi:update
    cards:
      - type: markdown
        content: |
          ## Update

          Use after pushing a known-good GitHub version.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Download latest
            icon: mdi:cloud-download-outline
            tap_action:
              action: call-service
              service: rflink_raw.update_from_github
          - type: button
            name: Undo update
            icon: mdi:backup-restore
            tap_action:
              action: call-service
              service: rflink_raw.restore_last_update
