title: RFLink Raw Tools
views:
  - title: Start
    path: rflink-start
    icon: mdi:home-automation
    cards:
      - type: markdown
        content: |
          <p align="center"><img src="/local/rflink_raw/logo.png" width="96"></p>

          # RFLink Raw Tools

          Setup uses on/off switches. Action controls do not use Home Assistant button entities.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Setup
            icon: mdi:cog-outline
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-setup
          - type: button
            name: Control
            icon: mdi:remote
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-control
          - type: button
            name: Debug
            icon: mdi:radio-tower
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-debug
          - type: button
            name: Update
            icon: mdi:update
            tap_action:
              action: navigate
              navigation_path: /rflink-raw-tools/rflink-update

  - title: Setup
    path: rflink-setup
    icon: mdi:cog-outline
    cards:
      - type: markdown
        content: |
          ## Setup

          Turn a switch on to apply. Turn it off to undo.

      - type: entities
        title: RFLink prerequisite
        show_header_toggle: false
        entities:
          - entity: text.rflink_prerequisite_port
            name: Port
          - entity: number.rflink_prerequisite_reconnect_interval
            name: Reconnect interval
          - entity: switch.rflink_prerequisite_wait_for_ack
            name: Wait for ACK
          - entity: switch.rflink_prerequisite
            name: RFLink prerequisite

      - type: entities
        title: Dashboard
        show_header_toggle: false
        entities:
          - entity: switch.rflink_dashboard
            name: Dashboard
          - entity: switch.rflink_sidebar
            name: Sidebar

  - title: Control
    path: rflink-control
    icon: mdi:remote
    cards:
      - type: entities
        title: Command values
        show_header_toggle: false
        entities:
          - entity: text.rflink_raw_command
            name: Raw command
          - entity: text.rflink_protocol_device_id
            name: Protocol device ID
          - entity: text.rflink_protocol_command
            name: Protocol command
          - entity: number.rflink_repeat_count
            name: Repeat
          - entity: number.rflink_repeat_delay
            name: Delay

      - type: grid
        title: Send
        columns: 2
        square: false
        cards:
          - type: button
            name: Send raw
            icon: mdi:send
            tap_action:
              action: call-service
              service: rflink_raw.send_stored_raw
          - type: button
            name: Send protocol
            icon: mdi:remote
            tap_action:
              action: call-service
              service: rflink_raw.send_stored_protocol

  - title: Debug
    path: rflink-debug
    icon: mdi:radio-tower
    cards:
      - type: entities
        title: Capture
        show_header_toggle: false
        entities:
          - entity: switch.rflink_qrfdebug
            name: QRFDEBUG
          - entity: switch.rflink_rfdebug
            name: RFDEBUG

      - type: grid
        title: One-time commands
        columns: 2
        square: false
        cards:
          - type: button
            name: Ping
            icon: mdi:access-point-check
            tap_action:
              action: call-service
              service: rflink_raw.ping
          - type: button
            name: Version
            icon: mdi:information-outline
            tap_action:
              action: call-service
              service: rflink_raw.version

  - title: Update
    path: rflink-update
    icon: mdi:update
    cards:
      - type: markdown
        content: |
          ## Update

          Updates make a backup first.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Download latest
            icon: mdi:cloud-download-outline
            tap_action:
              action: call-service
              service: rflink_raw.update_from_github
          - type: button
            name: Undo update
            icon: mdi:backup-restore
            tap_action:
              action: call-service
              service: rflink_raw.restore_last_update
