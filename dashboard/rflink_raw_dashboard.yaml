title: RFLink Raw Tools
views:
  - title: Start
    path: rflink-start
    icon: mdi:home-automation
    cards:
      - type: picture
        image: /local/rflink_raw/logo.png
        tap_action:
          action: none
        hold_action:
          action: none

      - type: markdown
        content: |
          # RFLink Raw Tools

          Use this dashboard instead of the long default device entity page.

          **Setup** — install RFLink and dashboard/sidebar config.  
          **Control** — send RFLink commands.  
          **Debug** — capture RF packets and check logs.  
          **Update** — download the latest GitHub version from the UI.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Open setup help
            icon: mdi:file-cog-outline
            entity: button.help_show_dashboard_setup
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.help_show_dashboard_setup
          - type: button
            name: Show log commands
            icon: mdi:text-box-search-outline
            entity: button.help_show_log_commands
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.help_show_log_commands

      - type: entities
        title: Status
        show_header_toggle: false
        entities:
          - entity: sensor.status_rflink_prerequisite_status
            name: RFLink prerequisite
          - entity: sensor.status_rflink_dashboard_status
            name: Dashboard/sidebar
          - entity: sensor.status_rflink_update_status
            name: Update
          - entity: sensor.status_rflink_last_error
            name: Last error

  - title: Setup
    path: rflink-setup
    icon: mdi:cog-outline
    cards:
      - type: markdown
        content: |
          ## Setup

          Leave **Show in sidebar** on if this should be the main RFLink Raw Tools page in Home Assistant's left menu.

      - type: entities
        title: RFLink prerequisite
        show_header_toggle: false
        entities:
          - entity: text.setup_rflink_prerequisite_port
            name: USB port
          - entity: switch.setup_rflink_prerequisite_wait_for_ack
            name: Wait for ACK
          - entity: number.setup_rflink_prerequisite_reconnect_interval
            name: Reconnect interval

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Load RFLink defaults
            icon: mdi:tune-variant
            entity: button.setup_load_default_prerequisite_values
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.setup_load_default_prerequisite_values
          - type: button
            name: Install RFLink YAML
            icon: mdi:file-cog-outline
            entity: button.setup_install_rflink_prerequisite_yaml
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.setup_install_rflink_prerequisite_yaml

      - type: entities
        title: Dashboard/sidebar
        show_header_toggle: false
        entities:
          - entity: switch.dashboard_show_in_sidebar
            name: Show in sidebar
          - entity: switch.dashboard_require_admin
            name: Require admin
          - type: button
            name: Install/update dashboard
            icon: mdi:view-dashboard-edit-outline
            action_name: Install
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.dashboard_install_update_sidebar_page

      - type: entities
        title: Setup status
        show_header_toggle: false
        entities:
          - entity: sensor.status_rflink_prerequisite_status
            name: RFLink prerequisite
          - entity: sensor.status_rflink_dashboard_status
            name: Dashboard/sidebar

  - title: Control
    path: rflink-control
    icon: mdi:remote
    cards:
      - type: entities
        title: Raw command
        show_header_toggle: false
        entities:
          - entity: text.control_rflink_raw_command
            name: Command
          - entity: number.control_rflink_repeat_count
            name: Repeat
          - entity: number.control_rflink_repeat_delay
            name: Delay
          - type: button
            name: Send raw command
            icon: mdi:send
            action_name: Send
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.control_send_rflink_raw_command

      - type: entities
        title: Protocol command
        show_header_toggle: false
        entities:
          - entity: text.control_rflink_protocol_device_id
            name: Device ID
          - entity: text.control_rflink_protocol_command
            name: Command
          - entity: number.control_rflink_repeat_count
            name: Repeat
          - entity: number.control_rflink_repeat_delay
            name: Delay
          - type: button
            name: Send protocol command
            icon: mdi:remote
            action_name: Send
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.control_send_rflink_protocol_command

      - type: grid
        title: Examples
        columns: 2
        square: false
        cards:
          - type: button
            name: Load raw example
            icon: mdi:code-tags
            entity: button.help_load_example_raw_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.help_load_example_raw_command
          - type: button
            name: Load protocol example
            icon: mdi:gesture-tap-button
            entity: button.help_load_example_protocol_command
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.help_load_example_protocol_command

      - type: entities
        title: Result
        show_header_toggle: false
        entities:
          - entity: sensor.status_rflink_last_command
            name: Last command
          - entity: sensor.status_rflink_last_response
            name: Last response
          - entity: sensor.status_rflink_last_error
            name: Last error

  - title: Debug
    path: rflink-debug
    icon: mdi:radio-tower
    cards:
      - type: markdown
        content: |
          ## Debug and find devices

          Start capture, press the physical remote/device button once, then check logs.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Start QRFDEBUG
            icon: mdi:signal
            entity: button.debug_start_qrfdebug_capture
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_start_qrfdebug_capture
          - type: button
            name: Stop QRFDEBUG
            icon: mdi:signal-off
            entity: button.debug_stop_qrfdebug_capture
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_stop_qrfdebug_capture
          - type: button
            name: Start RFDEBUG
            icon: mdi:radio-tower
            entity: button.debug_start_rfdebug_capture
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_start_rfdebug_capture
          - type: button
            name: Stop RFDEBUG
            icon: mdi:radio-tower-off
            entity: button.debug_stop_rfdebug_capture
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_stop_rfdebug_capture

      - type: grid
        title: RFLink tests
        columns: 3
        square: false
        cards:
          - type: button
            name: Ping
            icon: mdi:access-point-check
            entity: button.debug_rflink_ping
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_ping
          - type: button
            name: Version
            icon: mdi:information-outline
            entity: button.debug_rflink_version
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_version
          - type: button
            name: Status
            icon: mdi:list-status
            entity: button.debug_rflink_status
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.debug_rflink_status

      - type: grid
        title: Help
        columns: 2
        square: false
        cards:
          - type: button
            name: Find device steps
            icon: mdi:radar
            entity: button.help_show_find_device_steps
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.help_show_find_device_steps
          - type: button
            name: Log commands
            icon: mdi:text-box-search-outline
            entity: button.help_show_log_commands
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.help_show_log_commands

  - title: Update
    path: rflink-update
    icon: mdi:update
    cards:
      - type: markdown
        content: |
          ## Update without command line

          Press **Download latest**, wait for the notification, then restart Home Assistant Core from the UI.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            name: Download latest
            icon: mdi:cloud-download-outline
            entity: button.update_download_latest_from_github
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.update_download_latest_from_github
          - type: button
            name: Show update help
            icon: mdi:information-outline
            entity: button.update_show_installed_location
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.update_show_installed_location

      - type: entities
        title: Update status
        show_header_toggle: false
        entities:
          - entity: sensor.status_rflink_update_status
            name: Status
