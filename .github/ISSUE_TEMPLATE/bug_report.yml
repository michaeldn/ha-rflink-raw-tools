name: Bug report
description: Report a problem with RFLink Raw Tools
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue and what you expected to happen.
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.x.x"
    validations:
      required: true
  - type: input
    id: install_method
    attributes:
      label: Install method
      placeholder: "HACS custom repository / manual installer"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste Home Assistant log lines for rflink_raw / rflink.
      render: text
