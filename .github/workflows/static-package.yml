name: Static package checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-package:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Compile Python without leaving cache artifacts
        run: |
          python3 - <<'PY'
          import py_compile
          from pathlib import Path

          errors = []
          for path in Path("custom_components/rflink_raw").glob("*.py"):
              try:
                  py_compile.compile(str(path), doraise=True)
              except Exception as err:
                  errors.append(f"{path}: {err}")

          if errors:
              raise SystemExit("\n".join(errors))
          PY

          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete

      - name: Reject generated Python cache artifacts
        run: |
          if find . -type d -name '__pycache__' -print | grep -q .; then
            echo "Found __pycache__ directories"
            find . -type d -name '__pycache__' -print
            exit 1
          fi
          if find . -type f -name '*.pyc' -print | grep -q .; then
            echo "Found *.pyc files"
            find . -type f -name '*.pyc' -print
            exit 1
          fi

      - name: Reject removed/generated app patterns
        run: |
          test ! -f custom_components/rflink_raw/button.py
          test ! -f custom_components/rflink_raw/updater.py
          test ! -d dashboard

      - name: Validate manifest and HACS metadata
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("custom_components/rflink_raw/manifest.json").read_text())
          hacs = json.loads(Path("hacs.json").read_text())

          required_manifest = [
              "domain",
              "name",
              "documentation",
              "issue_tracker",
              "codeowners",
              "version",
              "integration_type",
              "iot_class",
              "after_dependencies",
          ]
          missing = [key for key in required_manifest if key not in manifest or not manifest[key]]
          if missing:
              raise SystemExit(f"Missing manifest keys: {missing}")

          if manifest["domain"] != "rflink_raw":
              raise SystemExit("Unexpected manifest domain")
          if manifest["version"] != "0.0.1":
              raise SystemExit("Version must remain 0.0.1 until explicit release bump")
          if hacs.get("content_in_root") is not False:
              raise SystemExit("hacs.json content_in_root must be false")
          if hacs.get("name") != "RFLink Raw Tools":
              raise SystemExit("hacs.json name must be RFLink Raw Tools")
          if "domains" in hacs:
              raise SystemExit("hacs.json must not include unsupported key: domains")

          for dep in ["http", "frontend", "websocket_api", "rflink"]:
              if dep not in manifest.get("after_dependencies", []):
                  raise SystemExit(f"after_dependencies must include {dep}")

          print("Manifest and HACS metadata checks passed.")
          PY
