name: Validate with hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
