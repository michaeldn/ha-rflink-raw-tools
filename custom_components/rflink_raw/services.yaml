send_raw:
  name: Send raw RFLink command
  description: Send a full RFLink command string such as 10;NewKaku;01a2b3;1;ON;.
  fields:
    raw_command:
      required: true
      selector:
        text:
    repeat:
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 20
          mode: box
    delay_ms:
      required: false
      default: 250
      selector:
        number:
          min: 0
          max: 5000
          unit_of_measurement: ms
          mode: box

send_protocol:
  name: Send RFLink protocol command
  description: Send a device id and command through the RFLink gateway.
  fields:
    device_id:
      required: true
      selector:
        text:
    command:
      required: true
      selector:
        text:
    repeat:
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 20
          mode: box
    delay_ms:
      required: false
      default: 250
      selector:
        number:
          min: 0
          max: 5000
          unit_of_measurement: ms
          mode: box

ping_gateway:
  name: Ping RFLink gateway
  description: Send a gateway ping/control command.

version_gateway:
  name: Ask RFLink gateway version
  description: Send a gateway version/control command.

set_debug:
  name: Set RFLink debug mode
  description: Turn RFDEBUG or QRFDEBUG on/off.
  fields:
    debug_type:
      required: true
      selector:
        select:
          options:
            - rfdebug
            - qrfdebug
    enabled:
      required: true
      selector:
        boolean:


clear_status:
  name: Clear RFLink Raw Tools status
  description: Clear the app's last result, last error, and last command display.
