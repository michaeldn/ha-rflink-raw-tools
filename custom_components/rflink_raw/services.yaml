send_raw:
  name: Send raw RFLink command
  fields:
    raw_command:
      required: true
      selector:
        text:
    repeat:
      default: 1
      selector:
        number:
          min: 1
          max: 50
          mode: box
    delay_ms:
      default: 250
      selector:
        number:
          min: 0
          max: 10000
          mode: box

send_protocol:
  name: Send RFLink protocol command
  fields:
    device_id:
      required: true
      selector:
        text:
    command:
      required: true
      selector:
        text:
    repeat:
      default: 1
      selector:
        number:
          min: 1
          max: 50
          mode: box
    delay_ms:
      default: 250
      selector:
        number:
          min: 0
          max: 10000
          mode: box

send_stored_raw:
  name: Send stored raw RFLink command

send_stored_protocol:
  name: Send stored RFLink protocol command

ping:
  name: RFLink ping

version:
  name: RFLink version

update_from_github:
  name: Update from GitHub
  description: Download the latest version from GitHub after creating a backup.

restore_last_update:
  name: Restore last update backup
  description: Restore the last backup created by the update service.

install_prerequisite:
  name: Install RFLink prerequisite

remove_prerequisite:
  name: Remove RFLink prerequisite

add_dashboard:
  name: Add RFLink Raw Tools dashboard

remove_dashboard:
  name: Remove RFLink Raw Tools dashboard

add_sidebar:
  name: Add RFLink Raw Tools to sidebar

remove_sidebar:
  name: Remove RFLink Raw Tools from sidebar


reset_ui:
  name: Reset RFLink Raw Tools UI
  description: Remove stale RFLink Raw Tools registry entities left behind by older builds.


rebuild_dashboard:
  name: Rebuild RFLink Raw Tools dashboard
  description: Rebuild the RFLink Raw Tools YAML dashboard using actual entity IDs from the Home Assistant entity registry.
