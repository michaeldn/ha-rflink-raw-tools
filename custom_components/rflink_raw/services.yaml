send_raw:
  name: Send raw RFLink command
  fields:
    raw_command:
      required: true
      selector:
        text:
    repeat:
      default: 1
      selector:
        number:
          min: 1
          max: 50
          mode: box
    delay_ms:
      default: 250
      selector:
        number:
          min: 0
          max: 10000
          mode: box

send_protocol:
  name: Send RFLink protocol command
  fields:
    device_id:
      required: true
      selector:
        text:
    command:
      required: true
      selector:
        text:
    repeat:
      default: 1
      selector:
        number:
          min: 1
          max: 50
          mode: box
    delay_ms:
      default: 250
      selector:
        number:
          min: 0
          max: 10000
          mode: box

update_from_github:
  name: Update from GitHub
  description: Download the latest version from GitHub after creating a backup.

restore_last_update:
  name: Restore last update backup
  description: Restore the last backup created by the update service.
