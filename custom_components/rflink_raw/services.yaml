send_raw:
  name: Send raw RFLink command
  description: Send a full learned RFLink command string.
  fields:
    raw_command:
      required: true
      selector:
        text:
    repeat:
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 20
          mode: box
    delay_ms:
      required: false
      default: 250
      selector:
        number:
          min: 0
          max: 5000
          unit_of_measurement: ms
          mode: box
send_protocol:
  name: Send RFLink protocol command
  description: Send a device id and command through RFLink.
  fields:
    device_id:
      required: true
      selector:
        text:
    command:
      required: true
      selector:
        text:
ping_gateway:
  name: Check RFLink setup
  description: Non-throwing app diagnostic.
version_gateway:
  name: Check RFLink version support
  description: Non-throwing app diagnostic.
set_debug:
  name: Set RFLink logging mode
  description: Turn Home Assistant RFLink logger verbosity on/off for decoded/raw capture. This does not send rfdebug/qrfdebug commands to the RFLink gateway.
  fields:
    debug_type:
      required: true
      selector:
        select:
          options:
            - rfdebug
            - qrfdebug
    enabled:
      required: true
      selector:
        boolean:
clear_status:
  name: Clear RFLink Raw Tools status
  description: Clear the app status display.
install_rflink_yaml:
  name: Install RFLink YAML
  description: Add a conservative rflink block to configuration.yaml if missing.
  fields:
    port:
      required: false
      default: /dev/ttyUSB0
      selector:
        text:
