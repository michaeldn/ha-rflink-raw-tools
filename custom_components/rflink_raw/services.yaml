send_raw:
  name: Send raw RFLink command
  description: Send one direct RFLink command line.
  fields:
    raw_command:
      name: Raw command
      required: true
      selector:
        text:
    repeat:
      name: Repeat
      default: 1
      selector:
        number:
          min: 1
          max: 50
          mode: box
    delay_ms:
      name: Delay in milliseconds
      default: 250
      selector:
        number:
          min: 0
          max: 10000
          mode: box

send_protocol:
  name: Send RFLink protocol command
  description: Send a Home Assistant RFLink device command.
  fields:
    device_id:
      name: RFLink device id
      required: true
      selector:
        text:
    command:
      name: Command
      required: true
      selector:
        text:
    repeat:
      name: Repeat
      default: 1
      selector:
        number:
          min: 1
          max: 50
          mode: box
    delay_ms:
      name: Delay in milliseconds
      default: 250
      selector:
        number:
          min: 0
          max: 10000
          mode: box

rfdebug:
  name: Set RFDEBUG
  description: Turn RFLink RFDEBUG mode on or off.
  fields:
    mode:
      name: Mode
      required: true
      selector:
        select:
          options:
            - "on"
            - "off"

qrfdebug:
  name: Set QRFDEBUG
  description: Turn RFLink QRFDEBUG mode on or off.
  fields:
    mode:
      name: Mode
      required: true
      selector:
        select:
          options:
            - "on"
            - "off"
